<!DOCTYPE html>
<html lang="en" class="h-full dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>WeatherBet Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            ink: {
              950: '#070b12',
              900: '#0c1220',
              800: '#121a2b',
              700: '#1a2438',
              600: '#243049',
            },
            mint: { 400: '#34d399', 500: '#10b981' },
            rose: { 400: '#fb7185', 500: '#f43f5e' },
            amber: { 400: '#fbbf24' },
            sky: { 400: '#38bdf8' },
          },
          fontFamily: {
            sans: ['"DM Sans"', 'system-ui', 'sans-serif'],
            mono: ['"JetBrains Mono"', 'ui-monospace', 'monospace'],
          },
        },
      },
    };
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.4/dist/htmx.min.js"></script>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body class="h-full bg-ink-950 text-slate-200 font-sans antialiased"
      hx-boost="false">
  <div class="min-h-full flex flex-col">
    <header class="sticky top-0 z-30 border-b border-ink-600/60 bg-ink-950/90 backdrop-blur-md">
      <div class="max-w-[1600px] mx-auto px-4 sm:px-6 py-3 flex flex-wrap items-center gap-3 justify-between">
        <div class="flex items-center gap-3">
          <div class="h-8 w-8 rounded-lg bg-gradient-to-br from-sky-400 to-mint-500 flex items-center justify-center text-ink-950 font-bold text-sm">WB</div>
          <div>
            <h1 class="text-base sm:text-lg font-semibold tracking-tight text-white">WeatherBet</h1>
            <p class="text-[11px] text-slate-500 font-mono" id="hdr-meta">loading…</p>
          </div>
        </div>
        <div class="flex items-center gap-2">
          <label class="flex items-center gap-2 text-xs text-slate-400 cursor-pointer select-none">
            <input type="checkbox" id="auto-refresh"
                   class="rounded border-ink-600 bg-ink-800 text-sky-400 focus:ring-sky-400/40" />
            Auto 60s
          </label>
          <button type="button" id="btn-refresh"
                  class="px-3 py-1.5 rounded-md bg-ink-700 hover:bg-ink-600 text-sm text-white border border-ink-600 transition"
                  hx-get="/partials/{{ACTIVE_TAB}}"
                  hx-target="#main"
                  hx-swap="innerHTML"
                  hx-indicator="#main">
            Refresh
          </button>
        </div>
      </div>
      <nav class="max-w-[1600px] mx-auto px-4 sm:px-6 flex gap-1 overflow-x-auto pb-2" id="nav-tabs" role="tablist">
        <button type="button" class="tab-btn" data-tab="overview"
                hx-get="/partials/overview" hx-target="#main" hx-swap="innerHTML"
                hx-push-url="?tab=overview" hx-indicator="#main">Overview</button>
        <button type="button" class="tab-btn" data-tab="trades"
                hx-get="/partials/trades" hx-target="#main" hx-swap="innerHTML"
                hx-push-url="?tab=trades" hx-indicator="#main">Trades</button>
        <button type="button" class="tab-btn" data-tab="cities"
                hx-get="/partials/cities" hx-target="#main" hx-swap="innerHTML"
                hx-push-url="?tab=cities" hx-indicator="#main">Cities</button>
        <button type="button" class="tab-btn" data-tab="sources"
                hx-get="/partials/sources" hx-target="#main" hx-swap="innerHTML"
                hx-push-url="?tab=sources" hx-indicator="#main">Sources</button>
      </nav>
    </header>

    <main id="main" class="flex-1 max-w-[1600px] w-full mx-auto px-4 sm:px-6 py-6 htmx-main"
          hx-get="/partials/{{ACTIVE_TAB}}"
          hx-trigger="load"
          hx-swap="innerHTML">
      <p class="text-sm text-slate-500">Loading…</p>
    </main>

    <footer class="border-t border-ink-700/50 py-3 text-center text-[11px] text-slate-600">
      Read-only · paper data from <span class="font-mono">data/</span> · HTMX partials · no live orders
    </footer>
  </div>

  <!-- Market detail drawer -->
  <div id="drawer-backdrop" class="fixed inset-0 bg-black/60 z-40 hidden opacity-0 transition-opacity"></div>
  <aside id="drawer"
         class="fixed top-0 right-0 h-full w-full max-w-xl bg-ink-900 border-l border-ink-600 z-50 translate-x-full transition-transform duration-200 overflow-y-auto shadow-2xl">
    <div class="sticky top-0 bg-ink-900/95 backdrop-blur border-b border-ink-600 px-4 py-3 flex items-center justify-between">
      <h2 id="drawer-title" class="font-semibold text-white text-sm sm:text-base">Market</h2>
      <button type="button" id="drawer-close" class="text-slate-400 hover:text-white px-2 py-1 rounded">✕</button>
    </div>
    <div id="drawer-body" class="p-4 space-y-4 text-sm"></div>
  </aside>

  <script src="/js/charts.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
